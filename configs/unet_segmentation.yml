torch_seed: 101 #set torch seed
verbose: True
model_settings:
  num_channels: 3 #number of input channels (3 for RGB)
  num_classes: 4 #number of segmentation classes (must match the LabelMe XML object classes)
  bilinear: False
  model_out_path: ./ #directory to save the final model (a save_pretrained dir is created here)
train_settings:
  epochs: 1 #num epochs to train for
  batch_size: 7
  val_percent: 0.1 #percent of training set to reserve as validation set
  save_checkpoint: True #whether or not to save per-epoch state_dict checkpoints
  save_checkpoint_freq: 50 #save model every ___ epochs
  dir_checkpoint: './checkpoints/' #directory to save checkpoint models to
  learning_rate: 1e-5
  amp: False
  weight_decay: 1e-8
  momentum: 0.999
  gradient_clipping: 1.0
  gpu: 1 #sets CUDA_VISIBLE_DEVICES
  wandb_project_name: paintdetect #wandb project name (now actually used by the trainer)
  wandb_entity_name: meyers_luke_lab
  wandb_dir_path: ./
  wandb_resume: False
  checkpoint_to_load: #if resuming
data_settings:
  img_scale: 1 #scale to downsample images by
  data_paths:
    dir_train_img: '/home/lqmeyers/paintDetect/data/images/babyBeesOnly/training/' #training images
    dir_test_img: '/home/lqmeyers/paintDetect/data/images/babyBeesOnly/testing/' #test-set images
    dir_mask: '/home/lqmeyers/CVAT/babyBees3perID/Label_Me_3.0/default/Masks/' #root for per-class binary masks
    dir_xml: '/home/lqmeyers/CVAT/babyBees3perID/Label_Me_3.0/default/' #per-image LabelMe XML files
eval_settings:
  save_dir: './' #base path for dir to save output .npy files to
  prediction_suffix: '.pred'
  out_threshold: 0.5 #threshold for binary masks from predictions (typo `out_threshold=` fixed)
